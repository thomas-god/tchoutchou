name: App and client tests

on:
  pull_request:
    branches: ["main"]

jobs:
  app-test:
    name: cargo test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test

  client-test:
    name: svelte client test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 26.x
        uses: actions/setup-node@v4
        with:
          node-version: 26.x
      - run: npm ci
      - run: npm run build
      - run: npm run test
