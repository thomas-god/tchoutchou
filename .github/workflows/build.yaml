name: Build image of prototype app

on:
  push:
    branches:
      - main

jobs:
  build-proto-docker-image:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: '{{defaultContext}}:prototype'
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/thomas-god/tchoutchou-proto:main
            ghcr.io/thomas-god/tchoutchou-proto:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Move cache to original location
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
