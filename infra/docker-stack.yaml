services:
  tchoutchou-api:
    image: ghcr.io/thomas-god/tchoutchou-app:main
    labels:
      - 'traefik.enable=true'

      - 'traefik.http.services.tchoutchou-api.loadbalancer.server.port=3001'
      - 'traefik.http.routers.tchoutchou-api.rule=Host(`train.trackforge.fr`) && PathPrefix(`/api`)'
      - 'traefik.http.routers.tchoutchou-api.entrypoints=websecure'
      - 'traefik.http.routers.tchoutchou-api.tls.certresolver=myresolver'

      - 'traefik.docker.network=traefik-public'
    environment:
      SERVER_PORT: 3001
      ALLOW_ORIGIN: https://train.trackforge.fr
      DATA_LOCATION: /data

    networks:
      - traefik-public

    volumes:
      - tchoutchou_data:/data

    deploy:
      update_config:
        order: start-first

  tchoutchou:
    image: ghcr.io/thomas-god/tchoutchou-client:main
    labels:
      - 'traefik.enable=true'

      - 'traefik.http.services.tchoutchou.loadbalancer.server.port=3000'
      - 'traefik.http.routers.tchoutchou.rule=Host(`train.trackforge.fr`)'
      - 'traefik.http.routers.tchoutchou.entrypoints=websecure'
      - 'traefik.http.routers.tchoutchou.tls.certresolver=myresolver'

      - 'traefik.docker.network=traefik-public'
    environment:
      VITE_API_KEY_FILE: /run/secrets/tchoutchou_api_key
      VITE_DATABASE_PATH: /data/tchoutchou.db
      VITE_DESTINATIONS_DATABASE_PATH: /data/nodes.db
      VITE_DATA_PATH: /data
      BACKEND_URL: http://tchoutchou-api:3001

    networks:
      - traefik-public
    secrets:
      - tchoutchou_api_key

    volumes:
      - tchoutchou_data:/data

    deploy:
      update_config:
        order: start-first

secrets:
  tchoutchou_api_key:
    external: true

networks:
  traefik-public:
    external: true

volumes:
  tchoutchou_data:
